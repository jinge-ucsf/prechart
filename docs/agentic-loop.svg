<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ah" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#16283a"/></marker>
    <marker id="ahB" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#17557a"/></marker>
    <marker id="ahA" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#a35f06"/></marker>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#ffffff"/>

  <!-- ================= HEADER ================= -->
  <text x="44" y="48" font-size="27" font-weight="700" fill="#16283a">PreChart — the agent that cross-examines the chart</text>
  <text x="1238" y="42" text-anchor="end" font-size="22" font-weight="800" fill="#16283a">UCSF <tspan fill="#17557a">GI</tspan></text>
  <text x="1238" y="60" text-anchor="end" font-size="10" fill="#61707d">GI Procedure Suite</text>
  <text x="44" y="76" font-size="13" fill="#61707d">Two fallible witnesses, gated to the visit date — a model-directed loop summons a third the body can't coach, then refuses to guess and never auto-writes.</text>
  <line x1="40" y1="88" x2="1240" y2="88" stroke="#dbe2e8" stroke-width="1"/>

  <!-- thesis strip -->
  <rect x="40" y="98" width="1200" height="28" rx="6" fill="#eaf1f8"/>
  <text x="640" y="117" text-anchor="middle" font-size="13" font-weight="600" fill="#17557a">Not a pipeline — it loops.     Not a summarizer — it distrusts its inputs and refuses.     Not a workflow — the model directs it.</text>

  <!-- ================= INPUTS ================= -->
  <!-- CHART -->
  <rect x="44" y="158" width="200" height="140" rx="10" fill="#ffffff" stroke="#cdd7df" stroke-width="1.5"/>
  <text x="62" y="188" font-size="15" font-weight="700" fill="#16283a">CHART <tspan font-size="10.5" font-weight="400" fill="#61707d">(FHIR R4)</tspan></text>
  <text x="62" y="211" font-size="10.5" fill="#61707d">Problem / med / lab list —</text>
  <text x="62" y="226" font-size="10.5" fill="#61707d">goes stale, copies forward,</text>
  <text x="62" y="241" font-size="10.5" fill="#61707d">miscodes.</text>
  <rect x="62" y="258" width="120" height="22" rx="5" fill="#fbecea" stroke="#c0392b" stroke-width="1"/>
  <text x="122" y="273" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c0392b">CAN BE WRONG</text>

  <!-- ROOM -->
  <rect x="44" y="322" width="200" height="140" rx="10" fill="#ffffff" stroke="#cdd7df" stroke-width="1.5"/>
  <text x="62" y="352" font-size="15" font-weight="700" fill="#16283a">ROOM <tspan font-size="10.5" font-weight="400" fill="#61707d">(ambient)</tspan></text>
  <text x="62" y="375" font-size="10.5" fill="#61707d">Speaker-labeled speech —</text>
  <text x="62" y="390" font-size="10.5" fill="#61707d">misremembers, lay terms</text>
  <text x="62" y="405" font-size="10.5" fill="#61707d">('water pill'), mistranscribed.</text>
  <rect x="62" y="420" width="120" height="22" rx="5" fill="#fbecea" stroke="#c0392b" stroke-width="1"/>
  <text x="122" y="435" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c0392b">CAN BE WRONG</text>

  <!-- ================= TEMPORAL GUARD (gate) ================= -->
  <rect x="258" y="158" width="40" height="304" rx="10" fill="#eaf1f8" stroke="#17557a" stroke-width="1.5"/>
  <text transform="translate(274,310) rotate(-90)" text-anchor="middle" font-size="12" font-weight="700" fill="#17557a">TEMPORAL GUARD</text>
  <text transform="translate(289,310) rotate(-90)" text-anchor="middle" font-size="8.5" fill="#61707d">future withheld</text>
  <!-- inputs -> gate -->
  <line x1="244" y1="228" x2="256" y2="244" stroke="#16283a" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="244" y1="392" x2="256" y2="388" stroke="#16283a" stroke-width="1.4" marker-end="url(#ah)"/>
  <!-- gate -> hub -->
  <line x1="298" y1="300" x2="386" y2="234" stroke="#17557a" stroke-width="1.8" marker-end="url(#ahB)"/>
  <text x="332" y="300" font-size="9.5" font-weight="600" fill="#17557a">as-of-visit only</text>

  <!-- ================= AGENT HUB ================= -->
  <rect x="392" y="158" width="368" height="132" rx="12" fill="#eaf1f8" stroke="#17557a" stroke-width="2.5"/>
  <text x="414" y="190" font-size="16" font-weight="800" fill="#17557a">CLAUDE OPUS <tspan font-size="13" font-weight="600" fill="#16283a">— the agent</tspan></text>
  <text x="414" y="214" font-size="11" fill="#16283a">Every claim — from either side — is a</text>
  <text x="414" y="230" font-size="11" fill="#16283a">hypothesis. The model picks which claims</text>
  <text x="414" y="246" font-size="11" fill="#16283a">to probe, which tool to call, in what order,</text>
  <text x="414" y="262" font-size="11" fill="#16283a">and when it has enough.</text>
  <!-- loop tag -->
  <rect x="628" y="147" width="128" height="22" rx="11" fill="#17557a"/>
  <text x="692" y="162" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">↻ loops · ≤ 12 turns</text>

  <!-- hub <-> tools (the loop) -->
  <line x1="452" y1="290" x2="452" y2="335" stroke="#16283a" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="505" y1="335" x2="505" y2="292" stroke="#16283a" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="625" y1="335" x2="625" y2="292" stroke="#16283a" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="672" y1="290" x2="672" y2="335" stroke="#16283a" stroke-width="1.4" marker-end="url(#ah)"/>
  <rect x="479" y="305" width="166" height="15" rx="3" fill="#ffffff"/>
  <text x="562" y="315" text-anchor="middle" font-size="9.5" font-weight="600" fill="#61707d">model chooses which tool &amp; when</text>

  <!-- ================= TOOLS ================= -->
  <!-- triangulate -->
  <rect x="396" y="338" width="172" height="150" rx="10" fill="#ffffff" stroke="#17557a" stroke-width="1.8"/>
  <text x="410" y="366" font-size="12" font-weight="700" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#17557a">triangulate_</text>
  <text x="410" y="382" font-size="12" font-weight="700" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#17557a">chart_evidence</text>
  <text x="410" y="408" font-size="10" fill="#61707d">The chart's OWN signals —</text>
  <text x="410" y="423" font-size="10" fill="#61707d">refill recency · related labs</text>
  <text x="410" y="438" font-size="10" fill="#61707d">· duplicate therapy</text>
  <text x="410" y="453" font-size="10" fill="#61707d">· label-only status</text>

  <!-- body / third witness -->
  <rect x="584" y="338" width="176" height="150" rx="10" fill="#e2f2f3" stroke="#0e7c86" stroke-width="2.5"/>
  <rect x="594" y="347" width="156" height="20" rx="10" fill="#0e7c86"/>
  <text x="672" y="361" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">THE THIRD WITNESS · THE BODY</text>
  <text x="598" y="389" font-size="11" font-weight="700" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#0e7c86">check_physiologic_</text>
  <text x="598" y="404" font-size="11" font-weight="700" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#0e7c86">markers</text>
  <text x="598" y="427" font-size="9.5" fill="#16283a">The body neither side controls:</text>
  <text x="598" y="442" font-size="9.5" fill="#16283a">warfarin→INR · statin→LDL ·</text>
  <text x="598" y="457" font-size="9.5" fill="#16283a">metformin→A1c.</text>
  <text x="598" y="475" font-size="10" font-weight="700" fill="#0e7c86">backs one, both, or NEITHER</text>

  <!-- ================= EXITS ================= -->
  <!-- RESOLVED -->
  <rect x="832" y="158" width="408" height="132" rx="10" fill="#ffffff" stroke="#cdd7df" stroke-width="1.5"/>
  <text x="852" y="186" font-size="15" font-weight="700" fill="#16283a">RESOLVED <tspan font-size="10.5" font-weight="400" fill="#61707d">— one of six reconciliation states</tspan></text>
  <!-- chip row 1 -->
  <rect x="852" y="198" width="80" height="20" rx="5" fill="#4a5568"/><text x="892" y="212" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">CONFIRMED</text>
  <rect x="940" y="198" width="100" height="20" rx="5" fill="#c0392b"/><text x="990" y="212" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">CONTRADICTED</text>
  <rect x="1048" y="198" width="88" height="20" rx="5" fill="#2b6cb0"/><text x="1092" y="212" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">ELABORATED</text>
  <!-- chip row 2 -->
  <rect x="852" y="224" width="46" height="20" rx="5" fill="#2f855a"/><text x="875" y="238" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">NEW</text>
  <rect x="906" y="224" width="98" height="20" rx="5" fill="#718096"/><text x="955" y="238" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">UNADDRESSED</text>
  <text x="852" y="266" font-size="10" fill="#61707d">+ likely_correct (chart · patient · neither · unknown) + proposed_action</text>

  <!-- UNRESOLVED (indented, leaving a drop channel on its left) -->
  <rect x="900" y="322" width="340" height="132" rx="10" fill="#fdf3e3" stroke="#b26a09" stroke-width="2.5"/>
  <rect x="918" y="332" width="104" height="22" rx="6" fill="#d98a0b"/>
  <text x="970" y="347" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">UNRESOLVED</text>
  <text x="1032" y="349" font-size="12" font-weight="700" fill="#a35f06">— refuses to guess</text>
  <text x="918" y="378" font-size="10.5" fill="#16283a">The 6th state. Evidence insufficient →</text>
  <text x="918" y="394" font-size="10.5" fill="#16283a">recommended_next_data: the one datum</text>
  <text x="918" y="410" font-size="10.5" fill="#16283a">that would settle it — e.g. "order INR today".</text>

  <!-- hub -> exits (fork) -->
  <line x1="760" y1="204" x2="828" y2="210" stroke="#17557a" stroke-width="1.8" marker-end="url(#ahB)"/>
  <text x="772" y="199" font-size="9.5" fill="#61707d">settles it</text>
  <path d="M760,248 C 820,300 850,330 896,376" fill="none" stroke="#a35f06" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#ahA)"/>
  <text x="782" y="332" font-size="9.5" font-weight="600" fill="#a35f06">nothing settles it → won't guess</text>

  <!-- exits -> ribbon -->
  <line x1="862" y1="290" x2="862" y2="588" stroke="#16283a" stroke-width="1.3" marker-end="url(#ah)"/>
  <text x="870" y="556" font-size="9" fill="#61707d">→ sign-off</text>
  <line x1="1070" y1="454" x2="1070" y2="588" stroke="#a35f06" stroke-width="1.4" marker-end="url(#ahA)"/>
  <text x="1078" y="556" font-size="9" fill="#61707d">clinician acts on the ask</text>

  <!-- ================= SIGN-OFF RIBBON ================= -->
  <rect x="40" y="590" width="1200" height="46" rx="8" fill="#17557a"/>
  <text x="640" y="618" text-anchor="middle" font-size="12.5" fill="#ffffff"><tspan font-weight="800">requires_signoff</tspan>  —  dose · active/inactive med · allergy · anticoagulation are never auto-written.   The agent PROPOSES; the clinician SIGNS.</text>

  <!-- ================= FOOTNOTE ================= -->
  <text x="44" y="662" font-size="10" font-style="italic" fill="#8896a2">The two tools are deterministic — the agency is the model's choice of when to call them and when to stop, not the tools. The body is not an oracle; it can resolve neither account.</text>
  <text x="44" y="678" font-size="10" font-style="italic" fill="#8896a2">Future / post-visit artifacts are withheld by the Temporal Guard (they belong to a later agent, LeftBehind). The live agent runs Claude Opus; --dry-run is scaffolding, not the agent.</text>
</svg>
