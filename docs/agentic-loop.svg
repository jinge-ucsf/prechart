<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ah" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#16283a"/></marker>
    <marker id="ahG" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#2f855a"/></marker>
  </defs>
  <rect x="0" y="0" width="1280" height="720" fill="#ffffff"/>

  <!-- HEADER -->
  <text x="44" y="46" font-size="24" font-weight="800" fill="#16283a">PreChart — cross-examine the chart, steer the truth</text>
  <text x="1238" y="42" text-anchor="end" font-size="20" font-weight="800" fill="#16283a">UCSF <tspan fill="#17557a">GI</tspan></text>
  <text x="1238" y="59" text-anchor="end" font-size="10" fill="#5b6b7a">GI Procedure Suite</text>
  <text x="44" y="72" font-size="12.5" fill="#5b6b7a">Two fallible witnesses in, gated to the visit. The agent gathers objective evidence, proposes the truth per claim, and refuses when it can't — the clinician steers, and the note updates to match.</text>
  <line x1="40" y1="86" x2="1240" y2="86" stroke="#dbe2e8" stroke-width="1"/>
  <rect x="40" y="96" width="1200" height="26" rx="6" fill="#eaf1f8"/>
  <text x="640" y="113" text-anchor="middle" font-size="12.5" font-weight="600" fill="#17557a">Not a pipeline · not a summarizer (it refuses) · the clinician adjudicates, and the note stays coherent</text>

  <!-- stage-connecting arrows -->
  <line x1="323" y1="345" x2="345" y2="345" stroke="#16283a" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="631" y1="345" x2="653" y2="345" stroke="#16283a" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="939" y1="345" x2="961" y2="345" stroke="#2f855a" stroke-width="1.8" marker-end="url(#ahG)"/>

  <!-- ================= (1) TWO FALLIBLE WITNESSES ================= -->
  <rect x="40" y="150" width="282" height="390" rx="12" fill="#ffffff" stroke="#cdd7df" stroke-width="1.5"/>
  <circle cx="66" cy="176" r="12" fill="#17557a"/><text x="66" y="180" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">1</text>
  <text x="86" y="181" font-size="14.5" font-weight="700" fill="#16283a">Two fallible witnesses</text>

  <rect x="56" y="206" width="250" height="80" rx="8" fill="#fafbfc" stroke="#e2e8ee"/>
  <text x="70" y="228" font-size="13" font-weight="700" fill="#16283a">CHART</text>
  <text x="70" y="246" font-size="10.5" fill="#5b6b7a">FHIR · meds · labs · imaging · prior notes</text>
  <text x="70" y="261" font-size="10.5" fill="#5b6b7a">goes stale · copy-forward · miscodes</text>
  <rect x="70" y="268" width="104" height="16" rx="4" fill="#fbecea"/><text x="122" y="280" text-anchor="middle" font-size="9" font-weight="700" fill="#c0392b">CAN BE WRONG</text>

  <rect x="56" y="298" width="250" height="80" rx="8" fill="#fafbfc" stroke="#e2e8ee"/>
  <text x="70" y="320" font-size="13" font-weight="700" fill="#16283a">ROOM</text>
  <text x="70" y="338" font-size="10.5" fill="#5b6b7a">ambient transcript of the visit</text>
  <text x="70" y="353" font-size="10.5" fill="#5b6b7a">misremembers · lay terms · mis-heard</text>
  <rect x="70" y="360" width="104" height="16" rx="4" fill="#fbecea"/><text x="122" y="372" text-anchor="middle" font-size="9" font-weight="700" fill="#c0392b">CAN BE WRONG</text>

  <rect x="56" y="404" width="250" height="46" rx="8" fill="#eaf1f8" stroke="#17557a" stroke-width="1.2"/>
  <text x="181" y="424" text-anchor="middle" font-size="11.5" font-weight="700" fill="#17557a">Temporal guard</text>
  <text x="181" y="440" text-anchor="middle" font-size="10" fill="#5b6b7a">only what's knowable as-of the visit</text>

  <!-- ================= (2) THE AGENT ADJUDICATES ================= -->
  <rect x="348" y="150" width="282" height="390" rx="12" fill="#ffffff" stroke="#17557a" stroke-width="2"/>
  <circle cx="374" cy="176" r="12" fill="#17557a"/><text x="374" y="180" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">2</text>
  <text x="394" y="181" font-size="14.5" font-weight="700" fill="#16283a">The agent adjudicates</text>

  <text x="364" y="206" font-size="11" fill="#16283a">Gathers objective evidence for each</text>
  <text x="364" y="221" font-size="11" fill="#16283a">claim, then proposes the likely truth.</text>

  <rect x="364" y="234" width="250" height="42" rx="8" fill="#ffffff" stroke="#17557a" stroke-width="1.4"/>
  <text x="376" y="252" font-size="11" font-weight="700" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#17557a">triangulate_chart_evidence</text>
  <text x="376" y="268" font-size="9.5" fill="#5b6b7a">the chart's own signals (order gaps, labs)</text>

  <rect x="364" y="282" width="250" height="56" rx="8" fill="#e2f2f3" stroke="#0e7c86" stroke-width="2"/>
  <rect x="376" y="290" width="182" height="16" rx="8" fill="#0e7c86"/><text x="467" y="302" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">THE THIRD WITNESS · THE BODY</text>
  <text x="376" y="322" font-size="11" font-weight="700" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#0e7c86">check_physiologic_markers</text>
  <text x="376" y="334" font-size="9" fill="#16283a">INR · LDL · A1c — backs one, both, or NEITHER</text>

  <text x="364" y="360" font-size="10.5" font-weight="600" fill="#5b6b7a">proposes one state per claim:</text>
  <rect x="364" y="368" width="76" height="18" rx="5" fill="#4a5568"/><text x="402" y="381" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">CONFIRMED</text>
  <rect x="444" y="368" width="94" height="18" rx="5" fill="#c0392b"/><text x="491" y="381" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">CONTRADICTED</text>
  <rect x="542" y="368" width="80" height="18" rx="5" fill="#2b6cb0"/><text x="582" y="381" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">ELABORATED</text>
  <rect x="364" y="390" width="44" height="18" rx="5" fill="#2f855a"/><text x="386" y="403" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">NEW</text>
  <rect x="412" y="390" width="94" height="18" rx="5" fill="#718096"/><text x="459" y="403" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">UNADDRESSED</text>
  <rect x="510" y="390" width="86" height="18" rx="5" fill="#e08e0b"/><text x="553" y="403" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">UNRESOLVED</text>

  <rect x="364" y="418" width="250" height="34" rx="8" fill="#fafbfc" stroke="#e2e8ee"/>
  <text x="376" y="439" font-size="9.5" fill="#5b6b7a">Fast one-shot by default; full tool-use loop optional.</text>

  <!-- ================= (3) CLINICIAN STEERS ================= -->
  <rect x="656" y="150" width="282" height="390" rx="12" fill="#ffffff" stroke="#cdd7df" stroke-width="1.5"/>
  <circle cx="682" cy="176" r="12" fill="#17557a"/><text x="682" y="180" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">3</text>
  <text x="702" y="181" font-size="14.5" font-weight="700" fill="#16283a">Clinician steers</text>
  <text x="672" y="205" font-size="10.5" font-weight="600" fill="#5b6b7a">select the truth — agent pre-picks, you can override</text>
  <text x="672" y="226" font-size="10.5" fill="#16283a">e.g. Anticoagulation — chart lists warfarin active</text>

  <rect x="672" y="238" width="250" height="44" rx="8" fill="#eefaf1" stroke="#2f855a" stroke-width="1.8"/>
  <text x="684" y="256" font-size="10" font-weight="700" fill="#2f855a">ROOM  ✓ agent's pick</text>
  <text x="684" y="273" font-size="10.5" fill="#16283a">switched off warfarin → apixaban</text>

  <rect x="672" y="290" width="250" height="34" rx="8" fill="#fafbfc" stroke="#e2e8ee"/>
  <text x="684" y="304" font-size="10" font-weight="700" fill="#5b6b7a">CHART</text>
  <text x="684" y="317" font-size="10.5" fill="#16283a">warfarin 5 mg active</text>

  <rect x="672" y="332" width="250" height="34" rx="8" fill="#fdf3e3" stroke="#b26a09" stroke-width="1.2"/>
  <text x="684" y="346" font-size="10" font-weight="700" fill="#b26a09">UNRESOLVED</text>
  <text x="684" y="359" font-size="10.5" fill="#16283a">defer → order INR (won't guess)</text>

  <text x="672" y="392" font-size="10.5" fill="#5b6b7a">Refusal is a feature: when nothing settles it,</text>
  <text x="672" y="407" font-size="10.5" fill="#5b6b7a">it names the one datum that would — and waits.</text>

  <!-- ================= (4) THE NOTE FOLLOWS ================= -->
  <rect x="964" y="150" width="276" height="390" rx="12" fill="#ffffff" stroke="#cdd7df" stroke-width="1.5"/>
  <circle cx="990" cy="176" r="12" fill="#17557a"/><text x="990" y="180" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">4</text>
  <text x="1010" y="181" font-size="14.5" font-weight="700" fill="#16283a">The note follows</text>

  <rect x="980" y="200" width="244" height="250" rx="8" fill="#fbfcfe" stroke="#e2e8ee"/>
  <text x="994" y="221" font-size="10" font-weight="700" fill="#17557a">HISTORY OF PRESENT ILLNESS</text>
  <text x="994" y="237" font-size="10" fill="#16283a">64M, Barrett's surveillance, peri-</text>
  <text x="994" y="250" font-size="10" fill="#16283a">procedural anticoagulation review…</text>
  <text x="994" y="272" font-size="10" font-weight="700" fill="#17557a">OUTSIDE DATA (CARE EVERYWHERE)</text>
  <text x="994" y="288" font-size="10" fill="#16283a">INR 2.4 (2026-01-15) — stale</text>
  <text x="994" y="310" font-size="10" font-weight="700" fill="#17557a">ASSESSMENT &amp; PLAN</text>
  <text x="994" y="327" font-size="10" fill="#16283a">**Anticoagulation: off warfarin,</text>
  <text x="994" y="340" font-size="10" fill="#16283a">on apixaban per today's visit.</text>
  <text x="1000" y="355" font-size="10" fill="#16283a">- hold apixaban 2 days pre-procedure</text>
  <text x="1000" y="368" font-size="10" fill="#16283a">- resume 24h post if hemostasis ok</text>
  <rect x="994" y="384" width="216" height="50" rx="6" fill="#eefaf1" stroke="#2f855a" stroke-width="1.2"/>
  <text x="1102" y="405" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2f855a">↻ updates live</text>
  <text x="1102" y="421" text-anchor="middle" font-size="9.5" fill="#22543d">to reflect the chosen truth</text>

  <!-- ================= SIGN-OFF RIBBON ================= -->
  <rect x="40" y="558" width="1200" height="44" rx="8" fill="#17557a"/>
  <text x="640" y="585" text-anchor="middle" font-size="12.5" fill="#ffffff"><tspan font-weight="800">requires sign-off</tspan> — dose · med status · allergy · anticoagulation are never auto-written.  The agent proposes; the clinician signs.</text>

  <!-- ================= FOOTNOTE ================= -->
  <text x="44" y="628" font-size="10" font-style="italic" fill="#8896a2">The two tools are deterministic — the agency is the model's judgment over the evidence and its choice to refuse. The body is not an oracle; it can support neither account.</text>
  <text x="44" y="644" font-size="10" font-style="italic" fill="#8896a2">Synthetic data — no PHI. Fast one-shot adjudication by default (the full multi-turn tool-use loop is available). Part of the UCSF GI procedure-journey suite.</text>
</svg>
