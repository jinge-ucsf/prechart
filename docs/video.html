<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PreChart — 60s</title>
<style>
  :root{--blue:#3a9bd8;--dark:#0f1720}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--dark);overflow:hidden;
    font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#fff}

  /* real app footage, full-bleed */
  .footage{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;background:#fff}
  .veil{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(to top, rgba(15,23,32,.80) 0%, rgba(15,23,32,.40) 12%, rgba(15,23,32,0) 24%)}
  .wm{position:fixed;top:20px;right:28px;z-index:5;font-size:20px;font-weight:800;color:#16283a;
    background:rgba(255,255,255,.72);padding:3px 10px;border-radius:8px}
  .wm .gi{color:#17557a}

  .cap{position:fixed;left:0;right:0;bottom:56px;z-index:5;text-align:center;padding:0 8vw;
    font-size:30px;line-height:1.42;font-weight:700;min-height:82px;
    text-shadow:0 2px 12px rgba(0,0,0,.7);transition:opacity .3s}

  /* full-screen title / close cards */
  .card{position:fixed;inset:0;z-index:8;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;text-align:center;background:var(--dark);opacity:0;transition:opacity .6s ease;pointer-events:none}
  .card.on{opacity:1}
  .big{font-size:62px;font-weight:800;letter-spacing:-.5px}
  .sub{font-size:24px;color:#9fb2c2}
  .kick{font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--blue)}

  .prog{position:fixed;left:0;right:0;bottom:0;height:6px;background:rgba(255,255,255,.16);z-index:9}
  .progbar{height:100%;width:0;background:var(--blue)}
  .replay{position:fixed;bottom:18px;right:24px;z-index:10;display:none;background:var(--blue);color:#fff;border:0;
    border-radius:9px;padding:10px 18px;font:inherit;font-weight:700;cursor:pointer}
</style>
</head>
<body>
  <!-- the real PreChart app (live agent, gi-synth-0048) — the note updates as the clinician adjudicates -->
  <img class="footage" src="shots/override.gif" alt="PreChart live app">
  <div class="veil"></div>
  <div class="wm">UCSF <span class="gi">GI</span></div>
  <div class="cap" id="cap"></div>

  <div class="card on" id="titleCard">
    <div class="kick">UCSF GI · Future of Agentic AI in Healthcare</div>
    <div class="big">PreChart</div>
    <div class="sub">cross-examine the chart · steer the truth</div>
  </div>
  <div class="card" id="closeCard">
    <div class="big">The agent proposes.<br>The clinician decides.</div>
    <div class="sub">PreChart · UCSF GI</div>
  </div>

  <div class="prog"><div class="progbar" id="progbar"></div></div>
  <button class="replay" id="replay">▶ Replay</button>

<script>
  const beats = [
    {t:0,     card:'title', cap:''},
    {t:4000,  card:null,    cap:'Every clinic note starts from the chart — and the chart is often wrong.'},
    {t:13000, card:null,    cap:'PreChart treats the chart and the room as two fallible witnesses — and scans the whole record for adjacent clues.'},
    {t:23000, card:null,    cap:'The chart says warfarin; the room says apixaban — it weighs the evidence and plans around apixaban.'},
    {t:34000, card:null,    cap:'It also flags what the chart missed: a fish-oil “blood thinner,” and a DVT the chart calls unprovoked.'},
    {t:44000, card:null,    cap:'Pick the truth on any conflict — and the note rewrites, live.'},
    {t:53000, card:'close', cap:''},
    {t:60000, card:'close', cap:''},
  ];
  const cap=document.getElementById('cap'), progbar=document.getElementById('progbar'),
        replay=document.getElementById('replay'),
        titleCard=document.getElementById('titleCard'), closeCard=document.getElementById('closeCard');
  let timers=[];
  function setCard(which){ titleCard.classList.toggle('on', which==='title'); closeCard.classList.toggle('on', which==='close'); }
  function start(){
    timers.forEach(clearTimeout); timers=[]; replay.style.display='none';
    progbar.style.transition='none'; progbar.style.width='0'; void progbar.offsetWidth;
    progbar.style.transition='width 60s linear'; progbar.style.width='100%';
    beats.forEach(b=> timers.push(setTimeout(()=>{ setCard(b.card); cap.textContent=b.cap; }, b.t)) );
    timers.push(setTimeout(()=>{ replay.style.display='block'; }, 60000));
  }
  replay.addEventListener('click', start);
  window.addEventListener('load', start);
</script>
</body>
</html>
