<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PreChart</title>
<style>
  :root{
    --ink:#16283a; --muted:#5b6b7a; --line:#e2e8ee; --bg:#f6f8fb; --card:#fff;
    --blue:#17557a; --blueTint:#eaf1f8;
    --CONTRADICTED:#c0392b; --UNRESOLVED:#e08e0b; --ELABORATED:#2b6cb0;
    --NEW:#2f855a; --UNADDRESSED:#718096; --CONFIRMED:#4a5568;
  }
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.5 -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg)}
  .wrap{max-width:1440px;margin:0 auto;padding:0 20px 60px}
  header{display:flex;align-items:baseline;justify-content:space-between;padding:22px 0 6px}
  header h1{margin:0;font-size:26px}
  header .sub{color:var(--muted);font-size:13.5px;margin:2px 0 0}
  .wordmark{font-size:20px;font-weight:800}
  .wordmark .gi{color:var(--blue)}
  .wordmark .suite{display:block;text-align:right;font-size:10px;font-weight:400;color:var(--muted)}

  .controls{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;background:var(--card);
    border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0 18px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field.grow{flex:1;min-width:280px}
  .field label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  select{font:inherit;padding:8px 10px;border:1px solid #cdd7df;border-radius:8px;background:#fff;color:var(--ink);max-width:100%}
  .livewrap{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);padding-bottom:9px}
  button{font:inherit;font-weight:700;background:var(--blue);color:#fff;border:0;border-radius:9px;
    padding:10px 20px;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}

  .summary{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .summary .title{font-weight:700}
  .summary .meta{color:var(--muted);font-size:13px;margin-top:2px}
  .badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
  .badge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px}
  .badge.agent{background:#e6f4ea;color:#276749} .badge.dry{background:#fdf3e3;color:#a35f06}
  .badge.guard{background:var(--blueTint);color:var(--blue)}
  .badge.warn{background:#fbecea;color:#c0392b}
  .counts{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .cchip{font-size:11px;font-weight:700;color:#fff;padding:3px 8px;border-radius:6px}

  /* demographics header */
  .demo{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 18px;margin-bottom:14px}
  .namerow{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
  .pname{font-size:21px;font-weight:800}
  .pids{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
  .vmeta{color:var(--muted);font-size:13px;margin:4px 0 10px}
  /* note ‖ transcript */
  .split{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;align-items:start}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px 14px;min-width:0}
  @media (max-width:880px){ .split{grid-template-columns:1fr} }

  details{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:14px}
  summary{cursor:pointer;padding:12px 16px;font-weight:700;font-size:14px;list-style:none}
  summary::-webkit-details-marker{display:none}
  summary .hint{font-weight:400;color:var(--muted);font-size:12.5px}
  details .body{padding:0 16px 14px}

  .trace{display:flex;flex-direction:column;gap:6px}
  .tstep{display:flex;gap:10px;align-items:flex-start;font-size:13px;padding:7px 10px;background:#f8fafc;border:1px solid var(--line);border-radius:8px}
  .tstep .tool{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:11.5px;color:var(--blue);white-space:nowrap}
  .tstep .tgt{font-weight:600} .tstep .res{color:var(--muted)}

  .cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .cols h4{margin:0 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .witlist{margin:0;padding:0;list-style:none;font-size:13px}
  .witlist li{padding:5px 0;border-bottom:1px solid var(--line)}
  .tier{color:#9aa7b2;font-size:11px}

  .row{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:10px}
  .chip{color:#fff;font-size:11px;font-weight:700;padding:4px 8px;border-radius:6px;height:fit-content;white-space:nowrap}
  .rbody{flex:1;min-width:0}
  .topic{font-weight:600;margin-bottom:5px}
  .so{background:#fde68a;color:#7a5b00;font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:5px;margin-left:6px}
  .sides{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:13px;margin-bottom:5px}
  .verdict{font-size:12.5px;color:#333;margin-bottom:3px}
  .why{font-size:13px;color:#555;font-style:italic}
  .ev{margin:6px 0 0;padding-left:16px;font-size:12px;color:#6b7783}
  .next{background:#fff7ed;border-left:3px solid var(--UNRESOLVED);padding:5px 9px;font-size:12.5px;color:#7a5b00;margin-top:7px;border-radius:5px}

  /* section 3 — conflict cards (agent's pick highlighted) */
  .ccard{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:12px}
  .chd{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .ctopic{font-weight:700;font-size:14.5px}
  .sigflag{background:#fdecea;color:#c0392b;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
  .accounts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media (max-width:560px){ .accounts{grid-template-columns:1fr} }
  .side{border:1px solid var(--line);border-radius:8px;padding:9px 11px;background:#fafbfc}
  .side.win{border-color:#2f855a;background:#eefaf1;box-shadow:inset 0 0 0 1px #2f855a}
  .side.dim{opacity:.5}
  .sidehd{display:flex;align-items:center;gap:8px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:4px}
  .side.win .sidehd{color:#2f855a}
  .pick{background:#2f855a;color:#fff;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:4px;text-transform:none;letter-spacing:0}
  .sideval{font-size:13px;color:var(--ink)}
  .call{margin-top:10px;padding:8px 11px;border-radius:7px;font-size:13px}
  .call.resolved{background:#eefaf1;color:#22543d}
  .call.open{background:#fff7ed;color:#7a5b00}
  .whybox{border:0;background:transparent;margin:6px 0 0;border-radius:0}
  .whybox>summary{padding:4px 0;font-size:12px;color:var(--muted);font-weight:600}
  .whybox .body{padding:0}
  .routinelist{margin:0;padding:0;list-style:none;font-size:13px}
  .routinelist li{padding:4px 0;border-bottom:1px solid var(--line)}
  .minichip{color:#fff;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:5px;margin-right:6px;text-transform:lowercase}
  .miniact{color:var(--muted);font-size:12px}
  .empty{color:var(--muted);padding:40px 0;text-align:center}
  .spinner{width:16px;height:16px;border:2px solid #cbd5e1;border-top-color:var(--blue);border-radius:50%;
    display:inline-block;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .gt{font-size:12.5px}
  .gt div{padding:6px 0;border-bottom:1px solid var(--line)}
  .gt .k{font-weight:700}

  .secnum{display:inline-block;background:var(--blue);color:#fff;font-size:11px;font-weight:700;
    width:19px;height:19px;line-height:19px;text-align:center;border-radius:50%;margin-right:8px}
  .sechead{font-size:15px;font-weight:700;margin:2px 0 8px;display:flex;align-items:center}
  .sechead .hint{font-weight:400;color:var(--muted);font-size:12.5px;margin-left:8px}
  .note{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 20px 16px;margin-bottom:14px}
  .noteprose{white-space:pre-wrap;word-wrap:break-word;font:13px/1.5 -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);margin:0;background:#fbfcfe;border:1px solid var(--line);border-radius:8px;padding:14px 16px;height:620px;overflow:auto;transition:opacity .15s}
  .noteprose.updating{opacity:.4}
  .copybtn{margin-left:auto;background:#eef2f6;color:var(--blue);border:1px solid #d7dee6;border-radius:6px;
    font-size:11px;font-weight:700;padding:4px 11px;cursor:pointer}
  .transcript{height:620px;overflow:auto;font-size:13px;line-height:1.5;background:#fbfcfe;border:1px solid var(--line);border-radius:8px;padding:14px 16px}
  .transcript>div{margin:3px 0} .transcript .sp{font-weight:700;color:var(--blue)}

  /* 3-column layout + selectable conflict menu */
  .grid3{display:grid;grid-template-columns:1fr 1.3fr 1fr;gap:14px;align-items:start;margin-bottom:14px}
  @media (max-width:1000px){ .grid3{grid-template-columns:1fr} }
  .col{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;min-width:0}
  .colhead{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
  .coltitle{font-weight:700;font-size:14px}
  .seg{display:flex;flex-direction:column;gap:6px}
  .segopt{display:block;width:100%;text-align:left;background:#fafbfc;border:1px solid var(--line);border-radius:8px;
    padding:7px 10px;cursor:pointer;font:inherit;color:var(--ink)}
  .segopt:hover{border-color:#b9c4ce}
  .segopt.sel{border-color:#2f855a;background:#eefaf1;box-shadow:inset 0 0 0 1px #2f855a}
  .segtop{display:flex;align-items:center;gap:7px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
  .segopt.sel .segtop{color:#2f855a}
  .agenttag{background:#2f855a;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;text-transform:none;letter-spacing:0}
  .segval{font-size:12px;color:var(--ink);margin-top:3px;line-height:1.35}
  /* compact conflict card: horizontal toggle + one detail line */
  .cc-compact{padding:9px 11px;margin-bottom:9px}
  .cc-compact .chd{margin-bottom:7px;gap:6px}
  .cc-compact .ctopic{font-size:12.5px}
  .segbar{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .segbtn{flex:1;background:#fafbfc;border:0;border-right:1px solid var(--line);padding:6px 4px;
    font:inherit;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:4px}
  .segbtn:last-child{border-right:0}
  .segbtn:hover{background:#eef2f6}
  .segbtn.sel{background:#eefaf1;color:#22543d;font-weight:700}
  .segbtn[data-key="unresolved"].sel{background:#fdf3e3;color:#7a5b00}
  .adot{color:#2f855a;font-size:8px;line-height:1}
  .segdetail{font-size:11.5px;color:var(--ink);margin-top:6px;line-height:1.35;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>PreChart</h1>
      <p class="sub">Pick a patient. The agent cross-examines the chart against the room — and refuses to guess.</p>
    </div>
    <div class="wordmark">UCSF <span class="gi">GI</span><span class="suite">GI Procedure Suite</span></div>
  </header>

  <div class="controls">
    <div class="field grow">
      <label for="patient">Patient (synthetic)</label>
      <select id="patient"></select>
    </div>
    <div class="field">
      <label for="specialty">Specialty</label>
      <select id="specialty"></select>
    </div>
    <div class="livewrap"><input type="checkbox" id="live"><label for="live" id="livelabel">Live agent</label></div>
    <button id="run">Run PreChart</button>
  </div>

  <div id="out"><div class="empty">Select a patient and run PreChart.</div></div>
</div>

<script>
const ORDER = ["CONTRADICTED","UNRESOLVED","ELABORATED","NEW","UNADDRESSED","CONFIRMED"];
const $ = s => document.querySelector(s);
function el(tag, cls, txt){ const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; }

async function init(){
  const r = await fetch('/api/patients'); const d = await r.json();
  const psel = $('#patient');
  d.patients.forEach(p=>{
    const o = el('option', null, `${p.id.split('::')[0]} — ${p.visit_title}  (${p.planted} planted)`);
    o.value = p.index; psel.appendChild(o);
  });
  const ssel = $('#specialty');
  d.specialties.forEach(s=>{ const o=el('option',null,s); o.value=s; if(s==='gi')o.selected=true; ssel.appendChild(o); });
  const live = $('#live');
  if(d.has_key){ live.checked=true; $('#livelabel').textContent='Live agent (claude-opus-4-8)'; }
  else{ live.disabled=true; $('#livelabel').textContent='Live agent — set ANTHROPIC_API_KEY to enable'; }
  // default to the warfarin hero case if present
  const hero = d.patients.find(p=>p.index===47); if(hero) psel.value=47;
}

async function run(){
  const out = $('#out'); const btn=$('#run'); btn.disabled=true;
  const live = $('#live').checked;
  window.__ctx = {index:Number($('#patient').value), specialty:$('#specialty').value, live};
  out.innerHTML='';
  const load = el('div','empty');
  load.innerHTML = `<span class="spinner"></span>${live ? 'Running the agent…' : 'Reconciling…'}`;
  out.appendChild(load);
  try{
    const r = await fetch('/api/prechart', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(window.__ctx)});
    const d = await r.json();
    if(d.error){ out.innerHTML=''; out.appendChild(el('div','empty','Error: '+d.error)); return; }
    render(d);
  }catch(e){ out.innerHTML=''; out.appendChild(el('div','empty','Request failed: '+e)); }
  finally{ btn.disabled=false; }
}

function colHead(title, hint){
  const h = el('div','colhead');
  h.appendChild(el('span','coltitle', title));
  if(hint) h.appendChild(el('span','hint', hint));
  return h;
}

function render(d){
  const out = $('#out'); out.innerHTML='';
  const m = d.meta, pt = m.patient || {};

  // TOP — demographics (full width)
  const demo = el('div','demo');
  const nr = el('div','namerow');
  nr.appendChild(el('span','pname', pt.name || m.id));
  nr.appendChild(el('span','pids',
    `MRN ${pt.mrn||'—'}   ·   DOB ${pt.dob||'—'}` + (pt.age!=null?`  (${pt.age} y)`:'') + (pt.sex?`   ·   ${pt.sex}`:'')));
  demo.appendChild(nr);
  demo.appendChild(el('div','vmeta', `${m.date}   ·   ${m.specialty}`));
  const badges = el('div','badges');
  badges.appendChild(el('span','badge '+(m.is_dry?'dry':'agent'), m.mode));
  if(m.temporal_removed>0) badges.appendChild(el('span','badge guard', `Temporal guard: ${m.temporal_removed} future artifact(s) withheld`));
  if(m.warning) badges.appendChild(el('span','badge warn', m.warning));
  demo.appendChild(badges);
  out.appendChild(demo);

  // 3-COLUMN — transcript | working note | conflicts menu
  const grid = el('div','grid3');

  // LEFT: transcript
  const L = el('div','col');
  L.appendChild(colHead('Transcript', 'the room'));
  const tbody = el('div','transcript');
  (d.transcript||'').split('\n').forEach(line=>{
    const p = el('div'); const i = line.indexOf(':');
    if(i>0 && i<40){ p.appendChild(el('span','sp', line.slice(0,i+1))); p.appendChild(document.createTextNode(line.slice(i+1))); }
    else p.textContent = line;
    tbody.appendChild(p);
  });
  L.appendChild(tbody); grid.appendChild(L);

  // CENTER: working note (updates as the clinician adjudicates)
  const C = el('div','col');
  const ch = colHead('Working note', 'updates as you adjudicate →');
  const copy = el('button','copybtn','Copy');
  copy.onclick = () => { navigator.clipboard.writeText($('#noteBox').textContent||''); copy.textContent='Copied'; setTimeout(()=>copy.textContent='Copy',1200); };
  ch.appendChild(copy); C.appendChild(ch);
  const noteBox = el('pre','noteprose'); noteBox.id='noteBox'; noteBox.textContent = d.note || '(no note)';
  C.appendChild(noteBox); grid.appendChild(C);

  // RIGHT: conflicts menu (selectable)
  const R = el('div','col');
  R.appendChild(colHead('Conflicts & adjudication', 'select the truth'));
  R.appendChild(conflictsMenu(d));
  grid.appendChild(R);

  out.appendChild(grid);

  // seed the client note cache with the initial (agent-default) note, then warm the
  // likely overrides so toggling is instant
  window.__noteCache = new Map();
  window.__noteCache.set(decisionsKey(currentDecisions()), d.note || '');
  prefetchOverrides();

  // secondary detail (full width, collapsed)
  if(d.trace && d.trace.length) out.appendChild(traceDetails(d));
  out.appendChild(witnessDetails(d));
  if(d.planted && d.planted.length) out.appendChild(groundTruthDetails(d));
}

function conflictsMenu(d){
  const wrap = el('div');
  const byState = {}; ORDER.forEach(s=>byState[s]=[]);
  d.proposals.forEach(p=>{ (byState[p.state]||(byState[p.state]=[])).push(p); });
  const crit = ["CONTRADICTED","UNRESOLVED","NEW","ELABORATED"].flatMap(s => byState[s].sort((a,b)=>(a.topic||'').localeCompare(b.topic||'')));
  window.__conflicts = crit;
  window.__resolutions = {};
  if(!crit.length){
    wrap.appendChild(el('div','empty','No conflicts to adjudicate — chart and room agree.'));
  } else {
    crit.forEach(p=>{
      const def = p.likely_correct==='patient' ? 'room' : p.likely_correct==='chart' ? 'chart' : 'unresolved';
      window.__resolutions[p.topic] = def;
      wrap.appendChild(conflictSelect(p, def));
    });
  }
  // routine states, collapsed
  const OTHER = ["CONFIRMED","UNADDRESSED"];
  const other = OTHER.flatMap(s => byState[s]);
  if(other.length){
    const parts = OTHER.filter(s=>byState[s].length).map(s=>`${byState[s].length} ${s.toLowerCase()}`);
    const det = el('details');
    const sm = el('summary'); sm.innerHTML = `Other findings <span class="hint">— ${parts.join(' · ')}</span>`;
    det.appendChild(sm);
    const b = el('div','body'); const ul = el('ul','routinelist');
    other.forEach(p=>{
      const li = el('li'); const chip = el('span','minichip', p.state.toLowerCase()); chip.style.background=`var(--${p.state})`;
      li.appendChild(chip); li.appendChild(document.createTextNode(' ' + (p.topic||'')));
      ul.appendChild(li);
    });
    b.appendChild(ul); det.appendChild(b); wrap.appendChild(det);
  }
  return wrap;
}

function conflictSelect(p, def){
  const card = el('div','ccard cc-compact'); card.style.borderLeftColor = `var(--${p.state})`;
  const hd = el('div','chd');
  const chip = el('span','chip', p.state); chip.style.background=`var(--${p.state})`; hd.appendChild(chip);
  hd.appendChild(el('span','ctopic', p.topic||''));
  if((p.clinical_significance||'')==='high') hd.appendChild(el('span','sigflag','high'));
  card.appendChild(hd);

  const opts = [
    {key:'room',       label:'Room',       val:p.spoken_side, agent:p.likely_correct==='patient'},
    {key:'chart',      label:'Chart',      val:p.chart_side,  agent:p.likely_correct==='chart'},
    {key:'unresolved', label:'Unresolved', val:'defer — ' + (p.recommended_next_data||'gather more data first'),
                       agent:(p.likely_correct!=='patient' && p.likely_correct!=='chart')},
  ];
  const detail = el('div','segdetail');
  const setDetail = o => { detail.textContent = o.val || (o.key==='chart' ? '— not in chart' : o.key==='room' ? '— not mentioned' : ''); };
  const seg = el('div','segbar');   // compact horizontal toggle; detail line below shows the selection
  opts.forEach(o=>{
    const b = el('button','segbtn' + (def===o.key?' sel':'')); b.dataset.key = o.key;
    if(o.agent) b.appendChild(el('span','adot','●'));
    b.appendChild(document.createTextNode(o.label));
    b.onclick = () => {
      window.__resolutions[p.topic] = o.key;
      [...seg.querySelectorAll('.segbtn')].forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel'); setDetail(o); regenNote();
    };
    seg.appendChild(b);
  });
  card.appendChild(seg);
  setDetail(opts.find(o=>o.key===def) || opts[0]);
  card.appendChild(detail);

  if(p.reasoning || (p.evidence_dossier && p.evidence_dossier.length)){
    const det = el('details','whybox'); det.appendChild(el('summary', null, 'Supporting Evidence'));
    const b = el('div','body');
    if(p.reasoning) b.appendChild(el('div','why', p.reasoning));
    if(p.evidence_dossier && p.evidence_dossier.length){
      const ul = el('ul','ev');
      p.evidence_dossier.forEach(x=>{ const li=el('li'); li.innerHTML=`<b>${x.source||''}:</b> `; li.appendChild(document.createTextNode(x.finding||'')); ul.appendChild(li); });
      b.appendChild(ul);
    }
    det.appendChild(b); card.appendChild(det);
  }
  return card;
}

function currentDecisions(){
  return (window.__conflicts||[]).map(p=>({
    topic:p.topic, choice:window.__resolutions[p.topic], room:p.spoken_side, chart:p.chart_side }));
}
function decisionsKey(decisions){ return JSON.stringify(decisions.map(x=>[x.topic, x.choice])); }

async function fetchNote(decisions){
  const r = await fetch('/api/note', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(Object.assign({}, window.__ctx, {decisions}))});
  const d = await r.json();
  if(d.note) window.__noteCache.set(decisionsKey(decisions), d.note);
  return d.note;
}

// Warm the cache in the background for each conflict flipped to its opposite side,
// so the toggle the clinician is most likely to click swaps instantly.
async function prefetchOverrides(){
  const all = window.__conflicts||[];
  const defaults = Object.assign({}, window.__resolutions);
  for(const p of all.slice(0, 6)){   // bound prefetch cost; conflicts are in priority order
    const alt = defaults[p.topic]==='room' ? 'chart' : 'room';   // the opposite account
    // build the decision set over ALL conflicts so the cache key matches a real toggle
    const decisions = all.map(c=>({topic:c.topic, choice:(c.topic===p.topic?alt:defaults[c.topic]),
                                   room:c.spoken_side, chart:c.chart_side}));
    if(window.__noteCache.has(decisionsKey(decisions))) continue;
    try{ await fetchNote(decisions); }catch(e){}
  }
}

let __regenTimer = null;
function regenNote(){
  const box = $('#noteBox'); if(!box) return;
  const decisions = currentDecisions(), key = decisionsKey(decisions);
  if(window.__noteCache && window.__noteCache.has(key)){   // instant — already computed
    box.textContent = window.__noteCache.get(key); box.classList.remove('updating'); return;
  }
  box.classList.add('updating');
  clearTimeout(__regenTimer);
  __regenTimer = setTimeout(async ()=>{
    try{ const note = await fetchNote(decisions); if(note) box.textContent = note; }
    catch(e){ /* keep the current note on failure */ }
    box.classList.remove('updating');
  }, 250);
}

function traceDetails(d){
  const det = el('details');
  const sm = el('summary'); sm.innerHTML = `Investigation trace <span class="hint">— ${d.trace.length} tool call(s) the agent made</span>`;
  det.appendChild(sm);
  const b = el('div','body'); const t = el('div','trace');
  d.trace.forEach(step=>{
    const row = el('div','tstep'); row.appendChild(el('span','tool', step.tool));
    const box = el('div'); box.appendChild(el('span','tgt', step.target)); box.appendChild(document.createTextNode('  ')); box.appendChild(el('span','res', step.result||''));
    row.appendChild(box); t.appendChild(row);
  });
  b.appendChild(t); det.appendChild(b); return det;
}

function witnessDetails(d){
  const wd = el('details');
  const wsm = el('summary'); wsm.innerHTML = `Extracted witnesses <span class="hint">— ${d.chart_items.length} chart items · ${d.spoken.length} spoken assertions</span>`;
  wd.appendChild(wsm);
  const wb = el('div','body'); const cols = el('div','cols');
  const cc = el('div'); cc.appendChild(el('h4',null,'Chart')); const cul = el('ul','witlist');
  d.chart_items.forEach(it=>{ const li=el('li'); li.textContent=`${it.kind}: ${it.label} `; li.appendChild(el('span','tier',it.tier)); cul.appendChild(li); });
  cc.appendChild(cul);
  const rc = el('div'); rc.appendChild(el('h4',null,'Room')); const rul = el('ul','witlist');
  d.spoken.forEach(sp=>{ rul.appendChild(el('li',null,`${sp.speaker}: ${sp.quote}`)); });
  rc.appendChild(rul);
  cols.appendChild(cc); cols.appendChild(rc); wb.appendChild(cols); wd.appendChild(wb); return wd;
}

function groundTruthDetails(d){
  const gd = el('details');
  const gsm = el('summary'); gsm.innerHTML = `Benchmark ground truth <span class="hint">— ${d.planted.length} planted discrepancies (the answer key)</span>`;
  gd.appendChild(gsm);
  const gb = el('div','body'); const g = el('div','gt');
  d.planted.forEach(x=>{ const row=el('div');
    row.appendChild(el('span','k', `[${x.expected_state}${x.source_of_error&&x.source_of_error!=='none'?' · '+x.source_of_error+' wrong':''}] `));
    row.appendChild(document.createTextNode(`${x.chart_state||''} → ${x.spoken_truth||''}`)); g.appendChild(row); });
  gb.appendChild(g); gd.appendChild(gb); return gd;
}

$('#run').addEventListener('click', run);
init();
</script>
